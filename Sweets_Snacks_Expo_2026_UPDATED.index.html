<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sweets & Snacks Expo 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --candy-pink: #FF3E6C;
    --candy-yellow: #FFD600;
    --candy-teal: #00C9A7;
    --bg: #0F0F12;
    --surface: #1A1A20;
    --surface2: #22222A;
    --border: #2E2E38;
    --text: #F2F2F5;
    --muted: #888899;
    --star: #FFD600;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1A1A20 0%, #0F0F12 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 16px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .candy-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.25rem;
    letter-spacing: -0.02em;
    flex: 1;
  }

  header .expo-date {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
  }

  /* SEARCH / FILTER */
  .controls {
    display: flex;
    gap: 8px;
  }

  .search-wrap {
    flex: 1;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }

  input[type="search"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    padding: 8px 8px 8px 34px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="search"]:focus { border-color: var(--candy-pink); }
  input[type="search"]::placeholder { color: var(--muted); }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.78rem;
    padding: 6px 10px;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .filter-btn.active {
    background: var(--candy-pink);
    border-color: var(--candy-pink);
    color: #fff;
  }

  /* TABS */
  .tab-bar {
    display: flex;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 12px 18px;
    position: relative;
    transition: color 0.2s;
  }
  .tab.active { color: var(--candy-pink); }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--candy-pink);
    border-radius: 2px 2px 0 0;
  }

  /* PANELS */
  .panel { display: none; padding: 12px 12px 0; }
  .panel.active { display: block; }

  /* PRIORITY MEETINGS */
  .section-label {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    padding-left: 4px;
  }

  /* MEETING CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .card-header {
    align-items: center;
    cursor: pointer;
    display: flex;
    gap: 10px;
    padding: 14px;
    user-select: none;
  }

  .booth-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--candy-yellow);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    min-width: 52px;
    padding: 4px 8px;
    text-align: center;
  }

  .card-info { flex: 1; min-width: 0; }

  .card-brand {
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-meta {
    color: var(--muted);
    font-size: 0.76rem;
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-right {
    align-items: center;
    display: flex;
    gap: 8px;
  }

  .owner-chip {
    background: var(--surface2);
    border-radius: 6px;
    color: var(--candy-teal);
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 7px;
  }

  .star-btn {
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    padding: 2px;
    transition: color 0.15s, transform 0.15s;
  }
  .star-btn.starred { color: var(--star); }
  .star-btn:active { transform: scale(1.3); }

  .chevron {
    color: var(--muted);
    font-size: 0.75rem;
    transition: transform 0.2s;
  }
  .card.open .chevron { transform: rotate(180deg); }

  /* EXPANDED BODY */
  .card-body {
    border-top: 1px solid var(--border);
    display: none;
    padding: 14px;
  }
  .card.open .card-body { display: block; }

  /* CONTACTS TABLE */
  .contacts-section { margin-bottom: 14px; }
  .contacts-label {
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .contact-row {
    align-items: center;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    padding: 8px 0;
  }
  .contact-row:last-child { border-bottom: none; }

  .contact-avatar {
    align-items: center;
    background: var(--surface2);
    border-radius: 50%;
    color: var(--muted);
    display: flex;
    flex-shrink: 0;
    font-size: 0.72rem;
    font-weight: 700;
    height: 30px;
    justify-content: center;
    width: 30px;
  }

  .contact-name {
    font-size: 0.85rem;
    font-weight: 500;
  }
  .contact-title {
    color: var(--muted);
    font-size: 0.74rem;
    margin-top: 1px;
  }

  .engagement-pip {
    align-items: center;
    display: flex;
    flex-shrink: 0;
    gap: 2px;
    margin-left: auto;
  }
  .pip {
    background: var(--border);
    border-radius: 2px;
    height: 10px;
    width: 4px;
  }
  .pip.lit { background: var(--candy-teal); }
  .pip.lit.hot { background: var(--candy-pink); }

  .key-contact { position: relative; }
  .key-contact .contact-name::after {
    content: ' ★';
    color: var(--candy-yellow);
    font-size: 0.7rem;
  }

  /* NOTES AREA */
  .notes-label {
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    line-height: 1.5;
    min-height: 80px;
    outline: none;
    padding: 10px;
    resize: vertical;
    transition: border-color 0.2s;
    width: 100%;
  }
  textarea:focus { border-color: var(--candy-teal); }
  textarea::placeholder { color: var(--muted); opacity: 0.7; }

  .save-note-btn {
    background: var(--candy-teal);
    border: none;
    border-radius: 8px;
    color: #0F0F12;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    margin-top: 6px;
    padding: 8px 14px;
    transition: opacity 0.15s;
  }
  .save-note-btn:active { opacity: 0.8; }
  .saved-flash {
    color: var(--candy-teal);
    font-size: 0.75rem;
    display: inline-block;
    margin-left: 8px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .saved-flash.show { opacity: 1; }

  /* STATUS PILL */
  .status-row {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .status-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.72rem;
    padding: 4px 10px;
    transition: all 0.15s;
  }
  .status-pill.selected {
    color: #0F0F12;
    font-weight: 600;
  }
  .status-pill[data-s="visited"].selected { background: var(--candy-teal); border-color: var(--candy-teal); }
  .status-pill[data-s="followup"].selected { background: var(--candy-pink); border-color: var(--candy-pink); }
  .status-pill[data-s="skip"].selected { background: #555; border-color: #555; }

  /* AE row */
  .ae-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .ae-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .ae-input:focus { border-color: var(--candy-yellow); }
  .ae-input::placeholder { color: var(--muted); opacity: 0.7; }
  .ae-input::before { content: 'AE: '; }

  /* EMPTY STATE */
  .empty {
    color: var(--muted);
    font-size: 0.85rem;
    padding: 40px 20px;
    text-align: center;
  }

  /* SUMMARY CARD */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    line-height: 1;
  }
  .stat-num.pink { color: var(--candy-pink); }
  .stat-num.yellow { color: var(--candy-yellow); }
  .stat-num.teal { color: var(--candy-teal); }
  .stat-label { color: var(--muted); font-size: 0.72rem; margin-top: 4px; }

  .notes-summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .notes-summary-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 10px 14px;
    text-transform: uppercase;
  }
  .note-summary-row {
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
  }
  .note-summary-row:last-child { border-bottom: none; }
  .note-summary-brand { font-size: 0.85rem; font-weight: 600; }
  .note-summary-text { color: var(--muted); font-size: 0.78rem; margin-top: 3px; }
  .no-notes { color: var(--muted); font-size: 0.82rem; padding: 16px 14px; }

  .export-badge {
    background: #1a3a2a;
    border: 1px solid #2d6b4a;
    border-radius: 5px;
    color: #4ade80;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 2px 6px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .card-desc {
    color: var(--muted);
    font-size: 0.74rem;
    line-height: 1.4;
    margin-top: 4px;
  }
</style>
</head>

function renderExhibitorCard(item) {
  const id = 'exh_' + item.booth.replace(/[^a-zA-Z0-9]/g,'_') + '_' + item.brand.replace(/\W/g,'');
  const s = getCardState(id);
  const exportBadge = item.exports ? '<span class="export-badge">Exports</span>' : '';

  return `
  <div class="card" id="card_${id}">
    <div class="card-header" onclick="toggleCard('${id}')">
      <div class="booth-badge">#${item.booth}</div>
      <div class="card-info">
        <div class="card-brand">${item.brand}</div>
        ${item.desc ? `<div class="card-meta">${item.desc.slice(0,60)}${item.desc.length>60?'…':''}</div>` : ''}
      </div>
      <div class="card-right">
        ${exportBadge}
        <button class="star-btn ${s.starred ? 'starred' : ''}" onclick="toggleStar(event,'${id}')" title="Star">★</button>
        <span class="chevron">▾</span>
      </div>
    </div>
    <div class="card-body">
      <div class="status-row">
        <button class="status-pill ${s.statuses.includes('visited')?'selected':''}" data-s="visited" onclick="setStatus('${id}','visited',this)">✓ Visited</button>
        <button class="status-pill ${s.statuses.includes('followup')?'selected':''}" data-s="followup" onclick="setStatus('${id}','followup',this)">🔥 Follow Up</button>
        <button class="status-pill ${s.statuses.includes('skip')?'selected':''}" data-s="skip" onclick="setStatus('${id}','skip',this)">✕ Skip</button>
      </div>
      ${item.desc ? `<div class="card-desc" style="margin-bottom:10px">${item.desc}</div>` : ''}
      <div class="ae-row">
        <span style="color:var(--muted);font-size:0.72rem;letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap;flex-shrink:0">AE</span>
        <input type="text" id="ae_${id}" class="ae-input" placeholder="Account Executive name…" value="${s.ae||''}" oninput="autoSaveAE('${id}')">
        <span class="saved-flash" id="ae_flash_${id}" style="flex-shrink:0">✓</span>
      </div>
      <div class="notes-label">Notes</div>
      <textarea id="notes_${id}" placeholder="Tap to add meeting notes…" oninput="autoSaveNote('${id}')">${s.notes||''}</textarea>
      <div>
        <button class="save-note-btn" onclick="saveNote('${id}')">Save Notes</button>
        <span class="saved-flash" id="flash_${id}">Saved ✓</span>
      </div>
    </div>
  </div>`;
}


// ─── STATE ───────────────────────────────────────────────────────────────────
const state = JSON.parse(localStorage.getItem('sseState2026') || '{}');
let starFilterOn = false;

function saveState() {
  localStorage.setItem('sseState2026', JSON.stringify(state));
}

function getCardState(id) {
  if (!state[id]) state[id] = { statuses: [], notes: '', starred: false, ae: '' };
  // migrate old single-status string to array
  if (typeof state[id].status === 'string') {
    state[id].statuses = state[id].status ? [state[id].status] : [];
    delete state[id].status;
  }
  if (!state[id].statuses) state[id].statuses = [];
  if (!state[id].ae) state[id].ae = '';
  return state[id];
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function initials(name) {
  return name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
}

function engPips(eng) {
  if (!eng || eng === '-') return '';
  const n = Math.min(parseInt(eng)||0, 10);
  let html = '<div class="engagement-pip">';
  for (let i = 0; i < 5; i++) {
    const lit = i < Math.ceil(n/2);
    const hot = n >= 8 && lit;
    html += `<div class="pip${lit?' lit':''}${hot?' hot':''}"></div>`;
  }
  html += '</div>';
  return html;
}

function renderContacts(contacts) {
  if (!contacts || !contacts.length) return '<div style="color:var(--muted);font-size:0.78rem;padding:4px 0;">No contacts listed</div>';
  return contacts.map(c => `
    <div class="contact-row ${c.key ? 'key-contact' : ''}">
      <div class="contact-avatar">${initials(c.name)}</div>
      <div>
        <div class="contact-name">${c.name}</div>
        <div class="contact-title">${c.title}</div>
      </div>
      ${c.eng ? engPips(c.eng) : ''}
    </div>
  `).join('');
}

function renderCard(item, idPrefix) {
  const id = idPrefix + '_' + item.booth + '_' + item.brand.replace(/\W/g,'');
  const s = getCardState(id);
  const ownerHtml = item.owner ? `<span class="owner-chip">${item.owner}</span>` : '';

  return `
  <div class="card" id="card_${id}">
    <div class="card-header" onclick="toggleCard('${id}')">
      <div class="booth-badge">#${item.booth}</div>
      <div class="card-info">
        <div class="card-brand">${item.brand}</div>
        <div class="card-meta">${item.contacts.length ? item.contacts[0].name + (item.contacts.length > 1 ? ` +${item.contacts.length-1}` : '') : 'No contacts'}</div>
      </div>
      <div class="card-right">
        ${ownerHtml}
        <button class="star-btn ${s.starred ? 'starred' : ''}" onclick="toggleStar(event,'${id}')" title="Star">★</button>
        <span class="chevron">▾</span>
      </div>
    </div>
    <div class="card-body">
      <div class="status-row">
        <button class="status-pill ${s.statuses.includes('visited')?'selected':''}" data-s="visited" onclick="setStatus('${id}','visited',this)">✓ Visited</button>
        <button class="status-pill ${s.statuses.includes('followup')?'selected':''}" data-s="followup" onclick="setStatus('${id}','followup',this)">🔥 Follow Up</button>
        <button class="status-pill ${s.statuses.includes('skip')?'selected':''}" data-s="skip" onclick="setStatus('${id}','skip',this)">✕ Skip</button>
      </div>
      <div class="ae-row">
        <span style="color:var(--muted);font-size:0.72rem;letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap;flex-shrink:0">AE</span>
        <input type="text" id="ae_${id}" class="ae-input" placeholder="Account Executive name…" value="${s.ae||''}" oninput="autoSaveAE('${id}')">
        <span class="saved-flash" id="ae_flash_${id}" style="flex-shrink:0">✓</span>
      </div>
      <div class="contacts-section">
        <div class="contacts-label">Contacts</div>
        ${renderContacts(item.contacts)}
      </div>
      <div class="notes-label">Notes</div>
      <textarea id="notes_${id}" placeholder="Tap to add meeting notes…" oninput="autoSaveNote('${id}')">${s.notes||''}</textarea>
      <div>
        <button class="save-note-btn" onclick="saveNote('${id}')">Save Notes</button>
        <span class="saved-flash" id="flash_${id}">Saved ✓</span>
      </div>
    </div>
  </div>`;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function toggleCard(id) {
  const card = document.getElementById('card_' + id);
  card.classList.toggle('open');
}

function toggleStar(e, id) {
  e.stopPropagation();
  const s = getCardState(id);
  s.starred = !s.starred;
  saveState();
  const btn = e.currentTarget;
  btn.classList.toggle('starred', s.starred);
  if (starFilterOn) renderAll();
}

function setStatus(id, status, btn) {
  const s = getCardState(id);
  const idx = s.statuses.indexOf(status);
  if (idx >= 0) {
    s.statuses.splice(idx, 1);
    btn.classList.remove('selected');
  } else {
    s.statuses.push(status);
    btn.classList.add('selected');
  }
  saveState();
  updateSummary();
}

function saveAE(id) {
  const input = document.getElementById('ae_' + id);
  if (!input) return;
  const s = getCardState(id);
  s.ae = input.value;
  saveState();
  const flash = document.getElementById('ae_flash_' + id);
  if (flash) { flash.classList.add('show'); setTimeout(() => flash.classList.remove('show'), 1200); }
}

let saveTimers = {};
function autoSaveNote(id) {
  clearTimeout(saveTimers[id]);
  saveTimers[id] = setTimeout(() => saveNote(id, true), 1500);
}

let aeTimers = {};
function autoSaveAE(id) {
  clearTimeout(aeTimers[id]);
  aeTimers[id] = setTimeout(() => saveAE(id), 800);
}

function saveNote(id, silent) {
  const ta = document.getElementById('notes_' + id);
  if (!ta) return;
  const s = getCardState(id);
  s.notes = ta.value;
  saveState();
  updateSummary();
  if (!silent) {
    const flash = document.getElementById('flash_' + id);
    if (flash) {
      flash.classList.add('show');
      setTimeout(() => flash.classList.remove('show'), 1500);
    }
  }
}

function toggleStarFilter() {
  starFilterOn = !starFilterOn;
  document.getElementById('starFilter').classList.toggle('active', starFilterOn);
  renderAll();
}

// ─── SEARCH ──────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', renderAll);

function matchesSearch(item, q) {
  if (!q) return true;
  const lower = q.toLowerCase();
  if (item.brand.toLowerCase().includes(lower)) return true;
  if (item.booth.includes(lower)) return true;
  if ((item.owner||'').toLowerCase().includes(lower)) return true;
  if ((item.desc||'').toLowerCase().includes(lower)) return true;
  return (item.contacts||[]).some(c => c.name.toLowerCase().includes(lower) || c.title.toLowerCase().includes(lower));
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderAll() {
  const q = document.getElementById('searchInput').value.trim();

  // Priority tab — shows all starred items from Outreach Accounts + All Exhibitors
  const priPanel = document.getElementById('tab-priority');
  const starredOutreach = allBooths.filter(i => {
    const id = 'all_' + i.booth + '_' + i.brand.replace(/\W/g,'');
    return getCardState(id).starred && matchesSearch(i, q);
  });
  const starredExhibitors = allExhibitors.filter(i => {
    const id = 'exh_' + i.booth.replace(/[^a-zA-Z0-9]/g,'_') + '_' + i.brand.replace(/\W/g,'');
    return getCardState(id).starred && matchesSearch(i, q);
  });
  const totalPri = starredOutreach.length + starredExhibitors.length;
  if (totalPri === 0) {
    priPanel.innerHTML = '<div class="empty">No starred accounts yet — star brands in Outreach Accounts or All Exhibitors to add them here.</div>';
  } else {
    priPanel.innerHTML =
      (starredOutreach.length ? '<div class="section-label" style="padding-top:8px">Outreach Accounts (' + starredOutreach.length + ')</div>' + starredOutreach.map(i => renderCard(i,'all')).join('') : '') +
      (starredExhibitors.length ? '<div class="section-label" style="padding-top:8px">All Exhibitors (' + starredExhibitors.length + ')</div>' + starredExhibitors.map(i => renderExhibitorCard(i)).join('') : '');
  }

  // All tab
  const allPanel = document.getElementById('tab-all');
  const allFiltered = allBooths.filter(i => {
    if (starFilterOn && !getCardState('all_' + i.booth + '_' + i.brand.replace(/\W/g,'')).starred) return false;
    return matchesSearch(i, q);
  });
  allPanel.innerHTML = allFiltered.length
    ? '<div class="section-label" style="padding-top:8px">Outreach Accounts</div>' + allFiltered.map(i => renderCard(i,'all')).join('')
    : '<div class="empty">No matches found</div>';

  // All Exhibitors tab
  const exhPanel = document.getElementById('tab-exhibitors');
  const exhFiltered = allExhibitors.filter(i => {
    if (starFilterOn && !getCardState('exh_' + i.booth.replace(/[^a-zA-Z0-9]/g,'_') + '_' + i.brand.replace(/\W/g,'')).starred) return false;
    return matchesSearch(i, q);
  });
  exhPanel.innerHTML = exhFiltered.length
    ? `<div class="section-label" style="padding-top:8px">All Exhibitors (${exhFiltered.length})</div>` + exhFiltered.map(i => renderExhibitorCard(i)).join('')
    : '<div class="empty">No matches found</div>';

  updateSummary();
}

function updateSummary() {
  const allItems = [
    ...priorityMeetings.map(i => ({id:'pri_'+i.booth+'_'+i.brand.replace(/\W/g,''), brand:i.brand})),
    ...allBooths.map(i => ({id:'all_'+i.booth+'_'+i.brand.replace(/\W/g,''), brand:i.brand})),
    ...allExhibitors.map(i => ({id:'exh_'+i.booth.replace(/[^a-zA-Z0-9]/g,'_')+'_'+i.brand.replace(/\W/g,''), brand:i.brand})),
  ];
  // dedupe by brand
  const seen = new Set();
  const unique = allItems.filter(i => { if(seen.has(i.brand)) return false; seen.add(i.brand); return true; });

  const total = unique.length;
  const visited = unique.filter(i => (getCardState(i.id).statuses||[]).includes('visited')).length;
  const followup = unique.filter(i => (getCardState(i.id).statuses||[]).includes('followup')).length;
  const withNotes = unique.filter(i => (getCardState(i.id).notes||'').trim().length > 0).length;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-visited').textContent = visited;
  document.getElementById('stat-followup').textContent = followup;
  document.getElementById('stat-notes').textContent = withNotes;

  const notesList = document.getElementById('notes-summary-list');
  const noted = unique.filter(i => (getCardState(i.id).notes||'').trim().length > 0);
  if (!noted.length) {
    notesList.innerHTML = '<div class="no-notes">No notes yet — tap a card to add some!</div>';
  } else {
    notesList.innerHTML = noted.map(i => `
      <div class="note-summary-row">
        <div class="note-summary-brand">${i.brand}</div>
        <div class="note-summary-text">${getCardState(i.id).notes.slice(0,120)}${getCardState(i.id).notes.length>120?'…':''}</div>
      </div>
    `).join('');
  }
}

// ─── TABS ────────────────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'summary') updateSummary();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
